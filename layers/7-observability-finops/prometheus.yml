global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "agent-service"
    static_configs:
      - targets: ["agent-service:8001"]
  - job_name: "mock-crm-service"
    static_configs:
      - targets: ["mock-crm-service:8002"]
  - job_name: "mock-erp-service"
    static_configs:
      - targets: ["mock-erp-service:8004"]
  - job_name: "mcp-server"
    static_configs:
      - targets: ["mcp-server:8003"]
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]
