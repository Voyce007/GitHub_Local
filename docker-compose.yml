# ────────────────────────────────────────────────────────────────────────────
# AI-Native SDLC Reference Architecture — open source, laptop-deployable
# Maps to the 7-layer architecture:
#   1 Infrastructure        4 Integrated App Stack   7 Observability & FinOps
#   2 Data / KX Backbone     5 Orchestration
#   3 AI / Agent Backbone    6 Agentic Comms
#
# Usage:
#   docker compose --profile core up -d          # layers 1-3 + a chat UI (~6-8GB RAM)
#   docker compose --profile full up -d          # everything (16GB+ RAM recommended)
#   docker compose --profile <name> up -d        # a single layer, see README
# ────────────────────────────────────────────────────────────────────────────

networks:
  sdlc-net:
    driver: bridge

volumes:
  ollama-data:
  qdrant-data:
  postgres-data:
  minio-data:
  keycloak-data:
  grafana-data:
  prometheus-data:
  localstack-data:

services:

  # ── LAYER 1: INFRASTRUCTURE ────────────────────────────────────────────
  # Real cloud (AWS/Azure/GCP/Sovereign) is emulated locally so app code
  # written against AWS APIs (S3, IAM, Lambda, DynamoDB...) runs unmodified.
  localstack:
    image: localstack/localstack:4.4.0
    profiles: ["infrastructure", "full"]
    ports: ["4566:4566"]
    environment:
      - SERVICES=s3,iam,lambda,dynamodb,sts,secretsmanager
      - DEBUG=0
    volumes:
      - localstack-data:/var/lib/localstack
    networks: [sdlc-net]

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    profiles: ["infrastructure", "full"]
    command: start-dev
    ports: ["8080:8080"]
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    volumes:
      - keycloak-data:/opt/keycloak/data
    networks: [sdlc-net]

  # ── LAYER 2: DATA / KX BACKBONE ────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    profiles: ["core", "data", "full"]
    ports: ["11434:11434"]
    volumes:
      - ollama-data:/root/.ollama
    networks: [sdlc-net]
    # after first start: docker exec -it ollama-svc ollama pull llama3.1:8b
    container_name: ollama-svc

  qdrant:
    image: qdrant/qdrant:latest
    profiles: ["core", "data", "full"]
    ports: ["6333:6333", "6334:6334"]
    volumes:
      - qdrant-data:/qdrant/storage
    networks: [sdlc-net]

  postgres:
    image: postgres:16-alpine
    profiles: ["core", "data", "apps", "full"]
    ports: ["5432:5432"]
    environment:
      - POSTGRES_USER=sdlc
      - POSTGRES_PASSWORD=sdlc_local_dev
      - POSTGRES_DB=sdlc
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [sdlc-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdlc -d sdlc"]
      interval: 2s
      timeout: 5s
      retries: 15

  minio:
    image: minio/minio:latest
    profiles: ["data", "full"]
    command: server /data --console-address ":9001"
    ports: ["9000:9000", "9001:9001"]
    environment:
      - MINIO_ROOT_USER=sdlc_admin
      - MINIO_ROOT_PASSWORD=sdlc_local_dev
    volumes:
      - minio-data:/data
    networks: [sdlc-net]

  # ── LAYER 3: AI / AGENT BACKBONE ───────────────────────────────────────
  # LangChain / LangGraph / CrewAI / AutoGen live as Python deps inside this
  # service (see layers/3-ai-agent-backbone/agent-service). Claude Code is
  # your dev-time agent, driving all of this from the terminal.
  agent-service:
    build: ./layers/3-ai-agent-backbone/agent-service
    profiles: ["core", "agents", "full"]
    ports: ["8001:8001"]
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - QDRANT_URL=http://qdrant:6333
      - DATABASE_URL=postgresql://sdlc:sdlc_local_dev@postgres:5432/sdlc
    depends_on: [ollama, qdrant, postgres]
    networks: [sdlc-net]

  # ── LAYER 4: INTEGRATED APP STACK ──────────────────────────────────────
  # Stand-in for CRM/ERP/domain systems — a FastAPI service with a Postgres
  # schema, deliberately structured like a real domain integration so
  # Claude Code can extend it into real CRM/ERP connectors later.
  mock-crm-service:
    build: ./layers/4-integrated-app-stack/mock-crm-service
    profiles: ["apps", "full"]
    ports: ["8002:8002"]
    environment:
      - DATABASE_URL=postgresql://sdlc:sdlc_local_dev@postgres:5432/sdlc
    depends_on:
      postgres:
        condition: service_healthy
    networks: [sdlc-net]

  mock-erp-service:
    build: ./layers/4-integrated-app-stack/mock-erp-service
    profiles: ["apps", "full"]
    ports: ["8004:8004"]
    environment:
      - DATABASE_URL=postgresql://sdlc:sdlc_local_dev@postgres:5432/sdlc
    depends_on:
      postgres:
        condition: service_healthy
    networks: [sdlc-net]

  erp-ui:
    build: ./layers/4-integrated-app-stack/erp-ui
    profiles: ["apps", "full"]
    ports: ["8005:8005"]
    environment:
      - ERP_SERVICE_URL=http://mock-erp-service:8004
    depends_on:
      - mock-erp-service
    networks: [sdlc-net]

  # ── LAYER 5: ORCHESTRATION ─────────────────────────────────────────────
  mcp-server:
    build: ./layers/5-orchestration/mcp-server
    profiles: ["orchestration", "full"]
    ports: ["8003:8003"]
    environment:
      - AGENT_SERVICE_URL=http://agent-service:8001
      - CRM_SERVICE_URL=http://mock-crm-service:8002
    networks: [sdlc-net]

  traefik:
    image: traefik:v3.1
    profiles: ["orchestration", "full"]
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports: ["80:80", "8090:8080"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [sdlc-net]

  # ── LAYER 6: AGENTIC COMMS ─────────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    profiles: ["core", "comms", "full"]
    ports: ["3000:8080"]
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ollama-data:/root/.ollama
    depends_on: [ollama]
    networks: [sdlc-net]

  # ── LAYER 7: OBSERVABILITY & FINOPS ────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    profiles: ["observability", "full"]
    ports: ["9090:9090"]
    volumes:
      - ./layers/7-observability-finops/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks: [sdlc-net]

  grafana:
    image: grafana/grafana:latest
    profiles: ["observability", "full"]
    ports: ["3001:3000"]
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./layers/7-observability-finops/grafana-dashboards:/etc/grafana/provisioning/dashboards
    depends_on: [prometheus]
    networks: [sdlc-net]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    profiles: ["observability", "full"]
    command: ["--config=/etc/otel-collector.yml"]
    volumes:
      - ./layers/7-observability-finops/otel-collector.yml:/etc/otel-collector.yml
    ports: ["4317:4317", "4318:4318", "8889:8889"]
    networks: [sdlc-net]
